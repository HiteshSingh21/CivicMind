version: '3.8'

services:
  civicmind:
    build: .
    container_name: civicmind_app
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=gemini-2.0-flash
    volumes:
      - ./data:/app/data  # Mount data directory for persistent ChromaDB and Photos
    restart: unless-stopped

# To deploy on Google Cloud:
# 1. Build the image: gcloud builds submit --tag gcr.io/YOUR_PROJECT_ID/civicmind
# 2. Deploy to Cloud Run: gcloud run deploy civicmind --image gcr.io/YOUR_PROJECT_ID/civicmind --platform managed --allow-unauthenticated
